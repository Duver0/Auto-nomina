name: Descargar Nómina

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  descargar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Descargar nóminas
        run: node src/presentation/cli/descargar.js
        env:
          USERNAME: ${{ secrets.NOMINA_USERNAME }}
          PASSWORD: ${{ secrets.NOMINA_PASSWORD }}

      - name: Copiar a downloads
        run: |
          mkdir -p downloads
          cp output/*.pdf downloads/
          ls -la downloads/

      - name: Commit files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add downloads/
          git diff --staged --quiet || git commit -m "weekly: actualizar nóminas $(date +'%Y-%m-%d')"
          git push