<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5f2a">
  <title>Descargar Nómina - PSP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a5f2a 0%, #0d3d15 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 380px;
      width: calc(100% - 32px);
    }

    .icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    h1 {
      color: #1a5f2a;
      font-size: 19px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 18px;
    }

    /* ── Password form ── */
    .password-form {
      margin-bottom: 0;
    }

    .password-input {
      width: 100%;
      padding: 13px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .password-input:focus {
      border-color: #4CAF50;
    }

    .password-input.error {
      border-color: #f44336;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: #f44336;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* ── Files (grouped) ── */
    .files {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .files.show {
      display: flex;
    }

    /* Section group */
    .group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .group-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      text-align: left;
      padding-left: 4px;
    }

    /* Separator between groups */
    .group-sep {
      height: 1px;
      background: #eee;
      margin: 2px 0;
    }

    /* Download button */
    .file-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      padding: 11px 14px;
      border-radius: 10px;
      text-decoration: none;
      transition: transform 0.15s ease;
      box-shadow: 0 3px 10px rgba(76, 175, 80, 0.25);
    }

    .file-btn:active {
      transform: scale(0.98);
    }

    .file-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
      flex-shrink: 0;
    }

    .file-btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }

    .file-btn-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
    }

    .file-btn-period {
      font-size: 11px;
      opacity: 0.85;
      font-weight: 400;
    }

    /* Retroactivo gets a slightly different tint to stand out */
    .file-btn.retroactivo {
      background: linear-gradient(135deg, #1976D2 0%, #0D47A1 100%);
      box-shadow: 0 3px 10px rgba(25, 118, 210, 0.25);
    }

    /* ── Info bar ── */
    .info {
      background: #E8F5E9;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #2E7D32;
      line-height: 1.5;
    }

    .footer {
      margin-top: 14px;
      color: #bbb;
      font-size: 11px;
    }

    @media (max-height: 620px) {
      .container { padding: 16px; }
      .icon { width: 44px; height: 44px; margin-bottom: 10px; }
      .icon svg { width: 22px; height: 22px; }
      h1 { font-size: 17px; }
      .subtitle { font-size: 12px; margin-bottom: 12px; }
      .files { gap: 8px; margin-bottom: 10px; }
      .file-btn { padding: 9px 12px; }
      .file-btn-title { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" id="iconContainer">
      <svg viewBox="0 0 24 24">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>

    <h1>Descarga de Nómina</h1>
    <p class="subtitle">Ingrese su contraseña</p>

    <form class="password-form" id="passwordForm" onsubmit="return verificarPassword(event)">
      <input
        type="password"
        class="password-input"
        id="passwordInput"
        placeholder="Contraseña"
        autocomplete="off"
      >
      <p class="error-msg" id="errorMsg">Contraseña incorrecta</p>
      <button type="submit" class="submit-btn">Acceder</button>
    </form>

    <div class="files" id="filesContainer">

      <!-- Pensión 1 -->
      <div class="group">
        <span class="group-label">Pensión 1</span>
        <a id="btn-nomina1" href="#" class="file-btn" download>
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <div class="file-btn-text">
            <span class="file-btn-title">Colilla de Pago</span>
            <span class="file-btn-period" id="period-nomina1"></span>
          </div>
        </a>
        <a id="btn-prima1" href="#" class="file-btn" download style="display:none">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <div class="file-btn-text">
            <span class="file-btn-title">Prima de Servicio</span>
            <span class="file-btn-period" id="period-prima1"></span>
          </div>
        </a>
      </div>

      <div class="group-sep"></div>

      <!-- Pensión 2 -->
      <div class="group">
        <span class="group-label">Pensión 2</span>
        <a id="btn-nomina2" href="#" class="file-btn" download>
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <div class="file-btn-text">
            <span class="file-btn-title">Colilla de Pago</span>
            <span class="file-btn-period" id="period-nomina2"></span>
          </div>
        </a>
        <a id="btn-prima2" href="#" class="file-btn" download style="display:none">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <div class="file-btn-text">
            <span class="file-btn-title">Prima de Servicio</span>
            <span class="file-btn-period" id="period-prima2"></span>
          </div>
        </a>
      </div>

      <div class="group-sep"></div>

      <!-- Retroactivo -->
      <div class="group">
        <span class="group-label">Retroactivo</span>
        <a id="btn-retroactivo" href="#" class="file-btn retroactivo" download style="display:none">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <div class="file-btn-text">
            <span class="file-btn-title">Retroactivo Pensionados</span>
            <span class="file-btn-period" id="period-retroactivo"></span>
          </div>
        </a>
        <p id="retroactivo-empty" class="retroactivo-empty" style="display:none;font-size:12px;color:#999;text-align:left;padding-left:4px;">No disponible este período</p>
      </div>

    </div>

    <div class="info" id="infoContainer" style="display: none;">
      Actualización automática cada lunes
    </div>

    <p class="footer">Portal PSP · Policía Nacional</p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('SW registrado'))
        .catch(err => console.log('SW error:', err));
    }

    function extraerPeriodo(filename, prefix) {
      // e.g. "nomina1-abril-2026.pdf" with prefix "nomina1" → "Abril 2026"
      const re = new RegExp('^' + prefix + '-(.+)\\.pdf$');
      const m = filename.match(re);
      if (!m) return '';
      return m[1].replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function aplicarManifesto(manifest) {
      const entradas = [
        { key: 'nomina1',     btnId: 'btn-nomina1',     periodId: 'period-nomina1' },
        { key: 'nomina2',     btnId: 'btn-nomina2',     periodId: 'period-nomina2' },
        { key: 'prima1',      btnId: 'btn-prima1',      periodId: 'period-prima1' },
        { key: 'prima2',      btnId: 'btn-prima2',      periodId: 'period-prima2' },
        { key: 'retroactivo', btnId: 'btn-retroactivo', periodId: 'period-retroactivo' },
      ];

      for (const e of entradas) {
        const filename = manifest[e.key];
        const btn = document.getElementById(e.btnId);
        if (!btn) continue;
        if (filename) {
          btn.href = 'downloads/' + filename;
          btn.setAttribute('download', filename);
          const period = extraerPeriodo(filename, e.key);
          document.getElementById(e.periodId).textContent = period;
          btn.style.display = 'flex';
        } else {
          btn.style.display = 'none';
        }
      }

      // Show "no disponible" if retroactivo missing
      const retroEl = document.getElementById('retroactivo-empty');
      if (retroEl) retroEl.style.display = manifest.retroactivo ? 'none' : 'block';
    }

    fetch('downloads/manifest.json?t=' + Date.now())
      .then(r => r.json())
      .then(aplicarManifesto)
      .catch(() => {
        // Fallback: colillas with static links
        const n1 = document.getElementById('btn-nomina1');
        const n2 = document.getElementById('btn-nomina2');
        n1.href = 'downloads/nomina1-abril-2026.pdf';
        n2.href = 'downloads/nomina2-abril-2026.pdf';
      });
  </script>

</body>
</html>
