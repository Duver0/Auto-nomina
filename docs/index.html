<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Descargar Nómina - PSP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a5f2a 0%, #0d3d15 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 380px;
      width: calc(100% - 32px);
    }

    .icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .icon svg {
      width: 30px;
      height: 30px;
      fill: white;
    }

    h1 {
      color: #1a5f2a;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .files {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .file-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
    }

    .file-btn:active {
      transform: scale(0.98);
    }

    .file-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .info {
      background: #E8F5E9;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #2E7D32;
      line-height: 1.5;
    }

    .footer {
      margin-top: 16px;
      color: #999;
      font-size: 11px;
    }

    @media (max-height: 600px) {
      .container {
        padding: 16px;
      }
      .icon {
        width: 50px;
        height: 50px;
        margin-bottom: 10px;
      }
      .icon svg {
        width: 24px;
        height: 24px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 12px;
        margin-bottom: 12px;
      }
      .files {
        gap: 8px;
        margin-bottom: 12px;
      }
      .file-btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .info {
        padding: 10px;
        font-size: 11px;
      }
      .footer {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
    </div>

    <h1>Descarga de Nómina</h1>
    <p class="subtitle">Certificados de pensión</p>

    <div class="files">
      <a href="downloads/nomina1-abril-2026.pdf" class="file-btn" download>
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Descargar Nómina 1
      </a>

      <a href="downloads/nomina2-abril-2026.pdf" class="file-btn" download>
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Descargar Nómina 2
      </a>
    </div>

    <div class="info">
      Actualización automática cada lunes
    </div>

    <p class="footer">Portal PSP - Policía Nacional</p>
  </div>
</body>
</html>
