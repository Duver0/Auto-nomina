  <title>Descargar Nómina - PSP</title>

      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .password-input:focus {
      border-color: #4CAF50;
    }

    .password-input.error {
      border-color: #f44336;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .submit-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: #f44336;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .files {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .files.show {
      display: flex;
    }

    .file-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
    }

    .file-btn:active {
      transform: scale(0.98);
    }

    .file-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .info {
      background: #E8F5E9;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #2E7D32;
      line-height: 1.5;
    }

    .footer {
      margin-top: 16px;
      color: #999;
      font-size: 11px;
    }

    @media (max-height: 600px) {
      .container {
        padding: 16px;
      }
      .icon {
        width: 50px;
        height: 50px;
        margin-bottom: 10px;
      }
      .icon svg {
        width: 24px;
        height: 24px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 12px;
        margin-bottom: 12px;
      }
      .files {
        gap: 8px;
        margin-bottom: 12px;
      }
      .file-btn {
        padding: 12px 16px;
        font-size: 14px;
      }
      .info {
        padding: 10px;
        font-size: 11px;
      }
    }
  </style>
</head>

  </div>
